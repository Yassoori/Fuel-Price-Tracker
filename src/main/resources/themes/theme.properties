# ==========================================
# DESIGN TOKENS
# ==========================================
@primaryColor = #0F172A
@accentColor = #3B82F6
@hoverAccentColor = #2563EB
@bg = #F8FAFC
@fg = #0F172A
@cardBg = #FFFFFF
@gridColor = #F1F5F9
@headerBg = #FFFFFF
@headerFg = #64748B
@selectionBg = #EFF6FF

@buttonArc = 12
@componentArc = 12

# ==========================================
# GLOBAL COMPONENT STYLING
# ==========================================

Panel.background = @bg

Label.foreground = @fg
Label.font = 14

TextField.background = @cardBg
TextField.foreground = @fg
TextField.arc = @componentArc
TextField.margin = 8,12,8,12
TextField.focusedBorderColor = @accentColor
TextField.borderWidth = 1

ComboBox.background = @cardBg
ComboBox.foreground = @fg
ComboBox.arc = @componentArc
ComboBox.padding = 8,12,8,12
ComboBox.focusedBorderColor = @accentColor
ComboBox.borderWidth = 1

Button.arc = @buttonArc
Button.background = @accentColor
Button.foreground = #FFFFFF
Button.hoverBackground = @hoverAccentColor
Button.hoverForeground = #FFFFFF
Button.font = 14 bold
Button.margin = 10,20,10,20
Button.borderWidth = 0

TabbedPane.background = @bg
TabbedPane.foreground = @headerFg
TabbedPane.selectedBackground = @cardBg
TabbedPane.selectedForeground = @primaryColor
TabbedPane.tabArc = @componentArc
TabbedPane.font = 14 bold
TabbedPane.tabInsets = 12,24,12,24
TabbedPane.contentSeparatorColor = @gridColor
TabbedPane.contentAreaColor = @bg
TabbedPane.showTabSeparators = false

Table.background = @cardBg
Table.foreground = @fg
Table.selectionBackground = @selectionBg
Table.selectionForeground = @primaryColor
Table.gridColor = @gridColor
Table.rowHeight = 32
Table.showHorizontalLines = true
Table.showVerticalLines = false
Table.interlacedBackground = @headerBg

TableHeader.background = @headerBg
TableHeader.foreground = @headerFg
TableHeader.gridColor = @gridColor
TableHeader.font = 13 bold
TableHeader.cellMargins = 12,16,12,16
TableHeader.bottomSeparatorColor = @gridColor

ScrollPane.background = @cardBg
ScrollPane.border =
