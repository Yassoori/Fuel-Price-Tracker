# ==========================================
# DESIGN TOKENS (Similar to SCSS variables)
# ==========================================
@primaryColor = #1E3A8A
@accentColor = #3B82F6
@hoverAccentColor = #2563EB
@bg = #F8FAFC
@fg = #0F172A
@cardBg = #FFFFFF
@gridColor = #E2E8F0
@headerBg = #F1F5F9
@headerFg = #475569
@selectionBg = #EFF6FF

@buttonArc = 8
@componentArc = 8

# ==========================================
# GLOBAL COMPONENT STYLING OVERRIDES
# ==========================================

# Panelling
Panel.background = @bg

# General Typography
Label.foreground = @fg
Label.font = Inter 14 plain

# Text Fields & Combo Boxes
TextField.background = @cardBg
TextField.foreground = @fg
TextField.arc = @componentArc
TextField.margin = 4,6,4,6

ComboBox.background = @cardBg
ComboBox.foreground = @fg
ComboBox.arc = @componentArc
ComboBox.padding = 4,6,4,6

# Buttons
Button.arc = @buttonArc
Button.background = @accentColor
Button.foreground = #FFFFFF
Button.hoverBackground = @hoverAccentColor
Button.hoverForeground = #FFFFFF
Button.font = Inter 13 bold

# Tabs (JTabbedPane)
TabbedPane.background = @headerBg
TabbedPane.foreground = @headerFg
TabbedPane.selectedBackground = @primaryColor
TabbedPane.selectedForeground = #FFFFFF
TabbedPane.tabArc = @componentArc
TabbedPane.font = Inter 13 bold
TabbedPane.tabInsets = 8,16,8,16

# Data Tables (JTable)
Table.background = @cardBg
Table.foreground = @fg
Table.selectionBackground = @selectionBg
Table.selectionForeground = @primaryColor
Table.gridColor = @gridColor
Table.rowHeight = 28
Table.showHorizontalLines = true
Table.showVerticalLines = false

TableHeader.background = @headerBg
TableHeader.foreground = @headerFg
TableHeader.gridColor = @gridColor
TableHeader.font = Inter 13 bold
TableHeader.cellMargins = 6,12,6,12
